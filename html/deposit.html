<!DOCTYPE html>
<html  lang="es">
    <head>
        <meta charset="UTF-8">
        <title>Depositar</title>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
        <style>
            body {
                color: white;
                text-align: center;
                font-size: 130%;
                
            }
            .cuadroinicial {
                border-radius: 5rem;
                box-shadow:0 8px 16px 0 rgba(0,0,0,0.4);
                background-color:rgb(255, 132, 0);
                width: 60%;
            }
            h2 {
                font-size: 180%;
                font-weight: bold;
                border-radius: 5rem;
                
                color: white;
                -webkit-text-stroke-width: 0.1rem;
                -webkit-text-stroke-color: gray
            }
            button {
                margin-top: 2rem;
                width: 60%;
                font-size: 140%
            }
            label {
                margin-top: 1rem;
            }
            .parrafo {
               background-color: rgba(255, 255, 255, 0.614);
               border-radius: 0.4rem; 
               padding: 5%;
               color: rgb(172, 90, 2);
            }
            .aviso {
                color: white;
                font-size: 80%;
                background-color:  rgba(141, 139, 137, 0.767);
            }
        </style>
    </head>
    <body>
        <div class="container p-5 my-5 border cuadroinicial">
    <h2>Depositar</h2>
    <p class="parrafo" id="avisoAntes">Dinero Actual en cuenta: $ <span id="dineroActual"></span></p>
    <label class="group-text" for="deposito">Monto a depositar: </label>
    <input type="number" id="deposito" class="form-control">
    <button type="button" class="btn btn-secondary my-3" id="depositarValor">Realizar depósito</button>
    <button type="button" class="btn btn-secondary my-1" id="volverMenu">Volver al Menú Principal</button>  
    <p class="aviso" id="leyenda"></p>
    
</div>

<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
<script>
    window.onload = function() {
        let balance = localStorage.getItem("dineroActual");
        document.getElementById("dineroActual").textContent = balance ? Number(balance).toLocaleString("es-CL") : "0";
    };

    $(document).ready(function() {
        const dineroGuardado = localStorage.getItem("dineroActual");
        
        // Corregido: verificar si existe el valor, no un string
        if (dineroGuardado) {
            $("#dineroActual").text(Number(dineroGuardado).toLocaleString("es-CL"));
        } else {
            $("#dineroActual").text("0");
        }
        
        $("#avisoAntes").slideDown();
        
        // Función principal para depositar
        $("#depositarValor").click(function() {
            let monto = Number(document.getElementById("deposito").value);
            
            // Validar que el monto sea válido
            if (!monto || monto <= 0) {
                alert("Por favor ingrese un monto válido");
                return;
            }
            
            // Obtener balance actual
            const dineroGuardado = localStorage.getItem("dineroActual");
            let balance = dineroGuardado ? Number(dineroGuardado) : 0;
            
            // Calcular nuevo balance
            let nuevoBalance = balance + monto;
            
            // Guardar nuevo balance
            localStorage.setItem("dineroActual", nuevoBalance.toString());
            
            // Crear objeto del depósito
            let autoDeposito = {
                nombre: "Depósito propio",
                detalles: "Depósito en efectivo",
                monto: monto,
                fecha: new Date().toLocaleString(),
                tipo: "deposito"
            };
            
            // Guardar en el historial
            guardarDeposito(autoDeposito);
            
            // Mostrar resultado
            $("#leyenda").text("Depósito exitoso por $" + monto.toLocaleString("es-CL") + 
                             "\nNuevo balance: $" + nuevoBalance.toLocaleString("es-CL"));
            
            
            // Limpiar campo
            document.getElementById("deposito").value = "";
            
            // Actualizar balance mostrado
            document.getElementById("dineroActual").textContent = nuevoBalance.toLocaleString("es-CL");
            
            
        });

        // Función para guardar depósito en el historial
        function guardarDeposito(autoDeposito) {
            let historial = obtenerHistorial();
            historial.push(autoDeposito);
            
            let historialString = historial.map(function(item) {
                return item.nombre + "|" + item.detalles + "|" + 
                       item.monto + "|" + item.fecha + "|" + item.tipo;
            }).join("||");
            
            localStorage.setItem("historialTransferencia", historialString);
        }

        // Función para obtener historial completo
        function obtenerHistorial() {
            let historialString = localStorage.getItem("historialTransferencia");
            
            if (!historialString) {
                return [];
            }
            
            let items = historialString.split("||");
            let historial = [];
            
            for (let i = 0; i < items.length; i++) {
                let partes = items[i].split("|");
                if (partes.length === 5) {
                    historial.push({
                        nombre: partes[0],
                        detalles: partes[1],
                        monto: Number(partes[2]),
                        fecha: partes[3],
                        tipo: partes[4]
                    });
                }
            }
            
            return historial;
        }

        function redirigirConMensaje(mensaje, url) {
            $("#leyenda").text(mensaje).slideDown('fast');
            setTimeout(function() {
                window.location.href = url;
            }, 2000);
        }
        
        // Evento click para volver al menú
        $("#volverMenu").click(function() {
            redirigirConMensaje("Redirigiendo a Menú principal", "./menu.html");
        });
    });
</script>
        </script>
    </body>
</html>
