<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>Login</title>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
        <style>
            body {
                color: white;
                text-align: center;
                font-size: 130%;
                font-weight: bold;
                
            }
            .cuadroinicial {
                border-radius: 5rem;
                box-shadow:0 8px 16px 0 rgba(0, 0, 0, 0.231);
                background-color:rgb(255, 132, 0);
                width: 60%;
            }
            h2 {
                font-size: 200%;
                font-weight: bold;
                border-radius: 2%;
                margin-bottom: 5%;
                color: white;
                -webkit-text-stroke-width: 0.1rem;
                -webkit-text-stroke-color: gray;
            }
            button {
                margin-top: 2rem;
                width: 60%;
                font-size: 140%
            }
            label {
                width: 30%;
                margin-top: 1rem;
            }
        </style>
    </head>
    <body>
        <div class="container p-5 my-4 border cuadroinicial">
            <h2>Login</h2>
            <div class="container my-3" style="text-align: justify;"><label for="email">Email:</label>
            <input type="email" id="email"><br>
            <label  for="contraseña">Contraseña:</label>
            <input type="password" id="contraseña"></div> 
            <button type="button" class="btn btn-secondary" id="iniciar">Iniciar sesión</button>
            </div>

            <div class="alert alert-success" id="notificacionExito" style="display: none;">
                <strong>Datos correctos</strong> 
            </div>
            <div class="alert alert-info" id="notificacionError" style="display: none;">
                <strong>Datos incorrectos</strong> 
            </div>
            
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
        <script>
            $(document).ready(function() {
                $("#iniciar").click(function() {
                    let email = $("#email").val();
                    let clave = $("#contraseña").val() ;

                    if (email == "admin@admin.cl" && clave == "123") {

                    $('#notificacionExito').slideDown('fast')

                    setTimeout(function(){
                        window.location.href = "./menu.html";
                        }, 1000);

                    } 
                    else {
                    $('#notificacionError').slideDown('fast')
                    }
                });
            });
        </script>
    </body>
</html>
